# ============================================
# GIS 全栈项目 — Docker 服务编排
# PostGIS (空间数据库) + pgAdmin (管理界面)
# ============================================
#
# 使用方式：
#   docker compose up -d        # 启动所有服务
#   docker compose down         # 停止并清理
#   docker compose logs -f      # 查看实时日志
#
# 连接信息（PostGIS）：
#   主机: localhost:5432
#   数据库: gisdb
#   用户: gisuser
#   密码: gispass
#
# 连接信息（pgAdmin）：
#   地址: http://localhost:8080
#   邮箱: admin@gis.com
#   密码: admin123
#   → 添加服务器时 Host 填 gis-postgis（容器名）
#
# ============================================

services:

  # ---------- PostGIS 空间数据库 ----------
  postgis:
    image: postgis/postgis:16-3.4
    container_name: gis-postgis
    restart: unless-stopped

    environment:
      POSTGRES_DB: gisdb              # 初始化数据库名
      POSTGRES_USER: gisuser          # 数据库用户
      POSTGRES_PASSWORD: gispass      # 数据库密码
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"  # UTF-8 编码

    ports:
      - "127.0.0.1:5432:5432"         # 仅本地访问，不暴露到局域网

    volumes:
      - pgdata:/var/lib/postgresql/data   # 持久化数据卷
      - ./docker-data/postgis/init:/docker-entrypoint-initdb.d:ro  # 初始化脚本

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gisuser -d gisdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - gis-network

  # ---------- pgAdmin 数据库管理界面 ----------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gis-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gis.com     # 登录邮箱
      PGADMIN_DEFAULT_PASSWORD: admin123       # 登录密码
      PGADMIN_CONFIG_SERVER_MODE: "False"      # 单用户模式

    ports:
      - "127.0.0.1:8080:80"                    # http://localhost:8080

    depends_on:
      postgis:
        condition: service_healthy             # 等待 PostGIS 就绪再启动

    volumes:
      - pgadmin-data:/var/lib/pgadmin          # 持久化 pgAdmin 配置

    networks:
      - gis-network

# ============================================
# 持久化数据卷
# ============================================
volumes:
  pgdata:                # PostGIS 数据库文件（容器删除后数据不丢）
  pgadmin-data:          # pgAdmin 配置和服务器列表

# ============================================
# 内部网络
# ============================================
networks:
  gis-network:
    driver: bridge
